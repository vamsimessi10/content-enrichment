apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-enrichment
  labels:
    app: content-enrichment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-enrichment
  template:
    metadata:
      labels:
        app: content-enrichment
    spec:
      containers:
      - name: content-enrichment
        image: us-central1-docker.pkg.dev/content-enrichment-488220/content-enrichment/content-enrichment:latest
        ports:
        - containerPort: 8000
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "content-enrichment-488220"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 20
