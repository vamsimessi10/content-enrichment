name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn scikit-learn google-cloud-storage httpx pytest

      - name: Run tests
        run: |
          python3 -m pytest tests/test_api.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/content-enrichment-488220/content-enrichment/content-enrichment:latest .

      - name: Push to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/content-enrichment-488220/content-enrichment/content-enrichment:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy content-enrichment \
            --image us-central1-docker.pkg.dev/content-enrichment-488220/content-enrichment/content-enrichment:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 60 \
            --port 8000
